<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech-Care Diagnostics — EcoCircuit Collective</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide/dist/umd/lucide.min.js"></script>
    <link rel="stylesheet" href="./style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        nuBlue: '#35408e',
                        nuGold: '#ffd400',
                        nuDark: '#242b5e'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background: linear-gradient(135deg, #0f3d9e 0%, #1565c0 40%, #2196f3 80%, #42a5f5 100%);
        }
        .module-header-badge {
            display: inline-block;
            background: rgba(0,185,212,0.15);
            color: #00bcd4;
            border: 1px solid rgba(0,185,212,0.25);
            padding: 4px 14px;
            border-radius: 50px;
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        /* CHAT BUBBLES */
        .chat-bubble-bot {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 18px 18px 18px 4px;
            padding: 12px 16px;
            max-width: 82%;
            color: #fff;
            font-size: 14px;
            line-height: 1.6;
            animation: bubbleIn 0.3s ease;
        }
        .chat-bubble-user {
            background: rgba(0,185,212,0.18);
            border: 1px solid rgba(0,185,212,0.3);
            border-radius: 18px 18px 4px 18px;
            padding: 10px 16px;
            max-width: 75%;
            color: #e0f7fa;
            font-size: 13px;
            line-height: 1.5;
            margin-left: auto;
            animation: bubbleIn 0.25s ease;
            font-weight: 500;
        }
        .chat-row { display:flex; align-items:flex-end; gap:8px; margin-bottom:12px; }
        .chat-row.user { justify-content:flex-end; }
        .bot-avatar {
            width:30px; height:30px; min-width:30px;
            background: linear-gradient(135deg,#00bcd4,#1565c0);
            border-radius:50%; display:flex; align-items:center;
            justify-content:center; font-size:14px; flex-shrink:0;
        }

        /* CHOICE BUTTONS */
        .choice-btn {
            display:flex; align-items:flex-start; gap:10px;
            width:100%;
            background: rgba(255,255,255,0.05);
            border: 1.5px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            padding: 12px 14px;
            text-align:left; cursor:pointer;
            transition: all 0.18s ease; color:#fff;
        }
        .choice-btn:hover {
            background: rgba(0,185,212,0.15);
            border-color: rgba(0,185,212,0.5);
            transform: translateY(-1px);
        }
        .choice-btn:active { transform:translateY(0); }
        .choice-icon { font-size:18px; margin-top:1px; flex-shrink:0; }
        .choice-label { font-weight:700; font-size:13px; color:#fff; line-height:1.3; }
        .choice-desc  { font-size:11px; color:rgba(255,255,255,0.55); margin-top:2px; line-height:1.4; }

        /* INTENT TILES */
        .intent-tile {
            background: rgba(255,255,255,0.06);
            border: 2px solid rgba(255,255,255,0.12);
            border-radius: 16px; padding: 20px 18px;
            cursor:pointer; transition:all 0.2s ease; text-align:center;
        }
        .intent-tile:hover {
            border-color: rgba(0,185,212,0.6);
            background: rgba(0,185,212,0.10);
            transform: translateY(-2px);
        }
        .tile-icon  { font-size:36px; margin-bottom:10px; }
        .tile-label { font-weight:800; font-size:15px; color:#fff; }
        .tile-sub   { font-size:11px; color:rgba(255,255,255,0.5); margin-top:4px; line-height:1.4; }

        /* OUTCOMES */
        .outcome-diy  { background:rgba(46,204,113,0.08); border:1.5px solid rgba(46,204,113,0.35); border-radius:16px; padding:18px; }
        .outcome-shop { background:rgba(230,126,34,0.08);  border:1.5px solid rgba(230,126,34,0.35);  border-radius:16px; padding:18px; }

        /* TUTORIAL STEPS */
        .step-item { display:flex; gap:10px; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.06); }
        .step-item:last-child { border-bottom:none; }
        .step-num {
            width:22px; height:22px; min-width:22px;
            background:rgba(0,185,212,0.25); border-radius:50%;
            font-size:10px; font-weight:800; color:#00bcd4;
            display:flex; align-items:center; justify-content:center; margin-top:1px;
        }

        /* LOCATION CARDS */
        .location-card {
            background:rgba(255,255,255,0.06);
            border:1px solid rgba(255,255,255,0.12);
            border-radius:14px; overflow:hidden;
            transition:all 0.2s ease;
        }
        .location-card:hover { border-color:rgba(0,185,212,0.4); transform:translateY(-2px); }
        .location-badge-repair { background:rgba(255,212,0,0.15);  color:#ffd400; border:1px solid rgba(255,212,0,0.3); }
        .location-badge-waste  { background:rgba(46,204,113,0.15); color:#2ecc71; border:1px solid rgba(46,204,113,0.3); }

        /* TYPING */
        .typing-dots span {
            display:inline-block; width:6px; height:6px;
            background:rgba(255,255,255,0.5); border-radius:50%;
            margin:0 2px; animation:typingBounce 1.2s infinite ease-in-out;
        }
        .typing-dots span:nth-child(2) { animation-delay:0.2s; }
        .typing-dots span:nth-child(3) { animation-delay:0.4s; }

        /* TUTORIAL LINK */
        .tutorial-link-card {
            display:flex; align-items:center; gap:10px;
            background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1);
            border-radius:10px; padding:10px 12px; text-decoration:none;
            transition:all 0.18s ease;
        }
        .tutorial-link-card:hover { background:rgba(0,185,212,0.12); border-color:rgba(0,185,212,0.4); }

        /* DEVICE INPUT */
        .device-input {
            width:100%; background:rgba(255,255,255,0.08);
            border:1.5px solid rgba(255,255,255,0.18);
            border-radius:10px; padding:10px 14px;
            color:#fff; font-size:14px; outline:none;
            transition:border-color 0.2s;
        }
        .device-input:focus { border-color:rgba(0,185,212,0.6); }
        .device-input::placeholder { color:rgba(255,255,255,0.35); }

        /* PROGRESS */
        .progress-bar-track { background:rgba(255,255,255,0.1); border-radius:4px; height:4px; overflow:hidden; }
        .progress-bar-fill  { height:100%; background:linear-gradient(90deg,#00bcd4,#1565c0); border-radius:4px; transition:width 0.4s ease; }

        /* ANIMATIONS */
        @keyframes bubbleIn  { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
        @keyframes typingBounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }
        @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
        .animate-fadeIn { animation:fadeIn 0.35s ease forwards; }

        ::-webkit-scrollbar { width:4px; }
        ::-webkit-scrollbar-track { background:transparent; }
        ::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.2); border-radius:4px; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <div id="navbar-container"></div>

    <main class="flex-1 max-w-3xl mx-auto w-full px-4 py-8">

        <header class="mb-6">
            <span class="module-header-badge">MODULE 02 — TECH-CARE DIAGNOSTICS</span>
            <h1 class="text-white text-3xl sm:text-4xl font-extrabold tracking-tight mb-1">🔧 TECH-CARE</h1>
            <p class="text-blue-100 text-sm max-w-xl">
                AI-powered device assistant for
                <span id="currentProfileTitle" class="text-[#00bcd4] font-extrabold font-mono">your device</span>.
                Get step-by-step repair guidance or find a nearby service location.
            </p>
        </header>

        <!-- CHAT CARD -->
        <div class="card p-0 overflow-hidden mb-6" style="border-radius:20px;">

            <!-- HEADER BAR -->
            <div class="flex items-center justify-between px-5 py-4 border-b border-[rgba(255,255,255,0.08)]">
                <div class="flex items-center gap-3">
                    <div class="bot-avatar">🤖</div>
                    <div>
                        <div class="text-white font-bold text-sm">EcoCircuit Tech-Care Bot</div>
                        <div class="flex items-center gap-1.5">
                            <div class="w-1.5 h-1.5 rounded-full bg-green-400"></div>
                            <span class="text-[10px] text-green-300 font-semibold">Online</span>
                        </div>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <div class="hidden" id="progressSection">
                        <div class="text-[10px] text-blue-200 mb-1 font-mono text-right" id="progressLabel">Step 1 of 4</div>
                        <div class="progress-bar-track w-28">
                            <div class="progress-bar-fill" id="progressFill" style="width:25%"></div>
                        </div>
                    </div>
                    <button id="resetBtn" onclick="resetChat()" class="hidden text-[11px] text-blue-300 hover:text-white border border-[rgba(255,255,255,0.2)] rounded-full px-3 py-1 transition-colors">
                        ↺ Restart
                    </button>
                </div>
            </div>

            <!-- MESSAGES -->
            <div id="chatMessages" class="px-5 py-4 space-y-1 overflow-y-auto" style="min-height:320px; max-height:480px;"></div>

            <!-- INPUT / CHOICES AREA -->
            <div id="chatInputArea" class="px-5 pb-5 pt-2 border-t border-[rgba(255,255,255,0.06)]"></div>
        </div>

        <!-- DIRECTORY SECTION -->
        <div id="directorySection" class="hidden animate-fadeIn">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-white font-extrabold text-lg uppercase tracking-wide">📍 Campus Directory</h2>
                <div class="flex gap-2">
                    <button onclick="filterLocations('all')"    id="filterAll"    class="text-[11px] font-bold px-3 py-1 rounded-full border border-[rgba(255,255,255,0.3)] text-white hover:bg-white/10 transition-colors">All</button>
                    <button onclick="filterLocations('repair')" id="filterRepair" class="text-[11px] font-bold px-3 py-1 rounded-full border border-[rgba(255,212,0,0.4)] text-[#ffd400] hover:bg-[rgba(255,212,0,0.1)] transition-colors">Repair</button>
                    <button onclick="filterLocations('waste')"  id="filterWaste"  class="text-[11px] font-bold px-3 py-1 rounded-full border border-[rgba(46,204,113,0.4)] text-[#2ecc71] hover:bg-[rgba(46,204,113,0.1)] transition-colors">E-Waste</button>
                </div>
            </div>
            <div id="locationsGrid" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
        </div>

    </main>

    <footer>
        <div class="max-w-7xl mx-auto text-center px-4">
            <p class="text-xs mb-1 font-bold tracking-wide uppercase text-gray-500">EcoCircuit Collective &bull; National University Manila Campus</p>
        </div>
    </footer>

    <script src="./main.js"></script>
    <script>
    /* ════════════════════════════════════════════════════
       TECH-CARE CHATBOT — FRONTEND STATE MACHINE
       All choices are button-driven; no free-text input
       in the diagnostic flow.
    ════════════════════════════════════════════════════ */

    /* ── STATE ── */
    const TC = {
        LANDING        : 'LANDING',
        DAMAGE_TYPE    : 'DAMAGE_TYPE',
        SEVERITY       : 'SEVERITY',
        SPECIFIC_ISSUE : 'SPECIFIC_ISSUE',
        TUTORIAL_SEARCH: 'TUTORIAL_SEARCH',
        OUTCOME        : 'OUTCOME',
        DIRECTORY      : 'DIRECTORY',
    };

    /* ── SESSION VARS ── */
    let tcState      = TC.LANDING;
    let tcDevice     = null;
    let tcDamageType = null;
    let tcCategory   = null;
    let tcSeverity   = null;
    let tcIssue      = null;
    let allLocations = null;
    let tcHistory    = [];   // replayed to backend

    /* ── DATA ── */
    const DEVICE_LABELS = {
        cellphone: { label:'Cellphone',  icon:'📱' },
        laptop   : { label:'Laptop',     icon:'💻' },
        tablet   : { label:'Tablet',     icon:'📟' },
        desktop  : { label:'Desktop PC', icon:'🖥️' },
    };

    const EXTERNAL_ISSUES = [
        { key:'screen',            label:'Screen Damage',            desc:'Cracks, dead pixels, flickering, touch unresponsive', icon:'🖥' },
        { key:'battery_charging',  label:'Battery / Charging Issue', desc:"Won't charge, drains fast, swollen battery",          icon:'🔋' },
        { key:'port_connector',    label:'Port or Connector Issue',  desc:'USB, audio jack, HDMI not working, bent pins',        icon:'🔌' },
        { key:'keyboard_input',    label:'Keyboard / Input Issue',   desc:'Keys stuck or not working, trackpad erratic',         icon:'⌨️' },
        { key:'water_liquid',      label:'Liquid / Water Exposure',  desc:'Device got wet, spill, moisture inside ports',        icon:'💧' },
        { key:'physical_wear',     label:'Physical Wear / Casing',   desc:'Scratches, dents, loose casing, hinge loose',         icon:'🔧' },
    ];

    const SOFTWARE_ISSUES = [
        { key:'performance',    label:'Slow Performance / Freezing', desc:'Very slow, lags, freezes, long load times',          icon:'🐢' },
        { key:'storage_memory', label:'Storage or Memory Full',      desc:"Low storage warnings, apps crashing, can't save",    icon:'💾' },
        { key:'os_boot',        label:'OS or Boot Failure',          desc:"Won't start, boot loop, black screen, OS corrupted", icon:'⚠️' },
        { key:'virus_malware',  label:'Virus or Malware',            desc:'Pop-ups, suspicious behaviour, unauthorized access', icon:'🦠' },
        { key:'app_crashes',    label:'App Crashes or Freezes',      desc:'Specific apps crash repeatedly, force close errors', icon:'💥' },
        { key:'connectivity',   label:'Connectivity Issues',         desc:'Wi-Fi drops, Bluetooth not pairing, no internet',    icon:'📶' },
    ];

    const TUTORIALS = {
        screen: {
            title:'Screen Damage — Assessment & Cleaning', category:'Hardware Protocol', difficulty:'Easy to Moderate',
            tools:['Microfibre cloth','Screen protector','Isopropyl alcohol (70%)'],
            steps:[
                'Power off the device completely before touching the screen.',
                'Wipe gently with a dry microfibre cloth in circular motions.',
                'For smudges, lightly dampen the cloth with 70% isopropyl alcohol — never spray directly.',
                'Check for dead pixels by displaying solid white, black, red, green, and blue screens.',
                'Apply a tempered glass screen protector to prevent further surface damage.',
                'If you see cracks or the screen flickers with dead pixels, professional replacement is needed.',
            ],
            prevention:['Use a quality tempered glass protector at all times.','Avoid placing face-down on rough surfaces.','Use a protective case with screen-edge coverage.'],
        },
        battery_charging: {
            title:'Battery & Charging — Diagnosis & Optimisation', category:'Hardware Protocol', difficulty:'Easy',
            tools:['Original or certified charger','Compressed air (optional)'],
            steps:[
                'Check the charging cable and adapter for visible damage or fraying.',
                'Clean the charging port gently with compressed air to remove debris.',
                'Use a wooden or plastic toothpick to remove lint — never use metal.',
                'Test with a different certified cable and adapter.',
                'Perform a battery calibration: drain to 0%, then charge uninterrupted to 100%.',
                'Check battery health in device settings. If below 80%, schedule a replacement.',
                'Avoid charging in extreme heat or cold environments.',
            ],
            prevention:['Charge between 20%–80% for maximum cell longevity.','Avoid overnight charging.','Only use certified chargers matching your device wattage.'],
        },
        port_connector: {
            title:'Port & Connector — Cleaning & Inspection', category:'Hardware Protocol', difficulty:'Easy',
            tools:['Compressed air','Wooden toothpick','Flashlight','Lint-free cloth'],
            steps:[
                'Power off the device before inspecting ports.',
                'Use a flashlight to check for lint, debris, or bent pins.',
                'Blow short bursts of compressed air into the port.',
                'Use a wooden toothpick — never metal — to dislodge stubborn debris.',
                'Test with multiple compatible cables to confirm whether the issue is the port or cable.',
                'For USB ports: update drivers in Device Manager (Windows) or System Information (Mac).',
                'If bent pins are visible, seek professional repair immediately.',
            ],
            prevention:['Never force a connector — check orientation first.','Remove cables by gripping the head, not the cable.','Use port covers to keep dust out.'],
        },
        keyboard_input: {
            title:'Keyboard & Input — Cleaning & Troubleshooting', category:'Hardware Protocol', difficulty:'Easy to Moderate',
            tools:['Compressed air','Keycap puller (optional)','Isopropyl alcohol','Cotton swabs'],
            steps:[
                'Power off and disconnect from power before cleaning.',
                'Hold the keyboard at 45° and blow compressed air to clear debris between keys.',
                'Use a cotton swab lightly dampened with isopropyl alcohol for sticky keys.',
                'For deep cleaning, remove keycaps with a puller — photograph the layout first.',
                'Wipe each keycap with isopropyl alcohol and let dry completely.',
                'Check keyboard settings and update drivers for unresponsive keys.',
                'Test using an online keyboard tester (e.g. keyboardtester.com).',
            ],
            prevention:['Avoid eating or drinking near the keyboard.','Use a keyboard cover against dust and spills.','Clean monthly with compressed air.'],
        },
        water_liquid: {
            title:'Liquid Exposure — Emergency Protocol', category:'Hardware Protocol — URGENT', difficulty:'Moderate (time-sensitive)',
            tools:['Microfibre cloth','Compressed air','Silica gel packets'],
            steps:[
                'IMMEDIATELY power off — hold the power button until the device shuts down.',
                'Remove the battery if it is removable on your model.',
                'Remove SIM card, memory card, and all accessories.',
                'Gently shake the device to expel water from ports.',
                'Dab — do not rub — all surfaces with a dry microfibre cloth.',
                'Use compressed air at low pressure to blow water out of ports.',
                'Seal the device in a container with silica gel packets for 24–48 hours.',
                'DO NOT use a hair dryer — heat damages components.',
                'DO NOT charge for at least 48 hours after exposure.',
                'After 48 hours, try powering on. If erratic, seek professional repair immediately.',
            ],
            prevention:['Use a waterproof case in humid or outdoor environments.','Keep liquids away from devices at all times.','Back up data regularly.'],
        },
        physical_wear: {
            title:'Physical Wear & Casing — Maintenance & Protection', category:'Hardware Protocol', difficulty:'Easy',
            tools:['Microfibre cloth','Isopropyl alcohol (70%)','Protective case','Cable organiser'],
            steps:[
                'Wipe down the exterior with a microfibre cloth to remove oils and dust.',
                'For stubborn residue, use a cloth dampened with 70% isopropyl alcohol.',
                'Inspect all corners and edges for stress cracks, especially hinge areas on laptops.',
                'Check rubber feet — replace with adhesive rubber pads if worn flat.',
                'Tighten any loose screws using the correct screwdriver size.',
                'Apply a quality protective case or laptop sleeve.',
            ],
            prevention:['Use a protective case tailored to your model.','Clean weekly to prevent oil and grime build-up.','Store on a flat, stable surface when not in use.'],
        },
        performance: {
            title:'Performance Optimisation — Speed & Responsiveness', category:'Software Optimisation', difficulty:'Easy',
            tools:['Device settings','Task Manager / Activity Monitor','CCleaner (optional)'],
            steps:[
                'Restart the device — this clears RAM and closes background processes.',
                'Open Task Manager (Ctrl+Shift+Esc on Windows) or Activity Monitor (Mac) to find CPU/RAM hogs.',
                'Disable unnecessary startup programmes: Task Manager › Startup tab (Windows) or System Settings › Login Items (Mac).',
                'Uninstall unused applications.',
                'Clear browser cache and temp files in browser settings.',
                'Run Disk Cleanup (Windows) or empty Trash and clear system storage (Mac).',
                'Check for and install pending OS and driver updates.',
                'Reduce visual effects in Windows performance settings or Mac Accessibility.',
            ],
            prevention:['Restart at least once a week.','Keep at least 15% of storage free at all times.','Limit browser extensions to essentials only.'],
        },
        storage_memory: {
            title:'Storage & Memory Optimisation — Space Recovery', category:'Software Optimisation', difficulty:'Easy',
            tools:['Device storage settings','Cloud storage account','External drive (optional)'],
            steps:[
                'Open storage settings to identify which categories are using the most space.',
                'Delete duplicate photos and videos using Google Photos or iCloud.',
                'Move large files (videos, projects) to an external drive or cloud storage.',
                'Uninstall apps not used in the past 30 days.',
                'Clear app caches: Settings › Apps › App › Clear Cache (Android). Offload unused apps on iPhone.',
                'Empty the Recycle Bin or Trash after deleting files.',
                'Enable cloud backup for photos and documents to keep local storage light.',
            ],
            prevention:['Set a monthly reminder to clean downloads and temp files.','Keep storage below 80% for consistent performance.','Use streaming instead of downloading media locally.'],
        },
        os_boot: {
            title:'OS & Boot Issues — Diagnosis & Recovery', category:'Software Optimisation', difficulty:'Moderate to Advanced',
            tools:['OS recovery drive or bootable USB','Device manufacturer website'],
            steps:[
                'Hard reset: hold the power button for 10 seconds, then restart.',
                'If the device shows a black screen, connect to an external monitor to isolate display issues.',
                'Boot into Safe Mode to check if a third-party app is causing the failure.',
                '  Windows: Restart › hold Shift while clicking Restart › Troubleshoot › Advanced › Startup Settings › Safe Mode.',
                '  Mac: Restart while holding Shift until the Apple logo appears.',
                'In Safe Mode, uninstall recently installed apps that may have caused the boot failure.',
                'Run Windows Startup Repair: Settings › System › Recovery › Advanced Startup.',
                'Run macOS Disk Utility from Recovery Mode to repair disk errors.',
                'If the issue persists, back up all data and reinstall the OS from a recovery drive.',
            ],
            prevention:['Never force shutdown during OS updates.','Keep a bootable recovery USB ready.','Back up data weekly.'],
        },
        virus_malware: {
            title:'Virus & Malware Removal — Security Cleanup', category:'Software Optimisation', difficulty:'Moderate',
            tools:['Malwarebytes (free)','Windows Defender or built-in antivirus'],
            steps:[
                'Disconnect from the internet immediately.',
                'Boot into Safe Mode with Networking.',
                'Download and run Malwarebytes (free) — transfer via USB if needed.',
                'Run a full system scan with your built-in antivirus.',
                'Quarantine and delete all identified threats.',
                'Clear all browser data: history, cookies, cache, saved passwords.',
                'Remove unknown browser extensions and reset browser settings to default.',
                'Change passwords for all accounts from a separate clean device.',
                'Enable two-factor authentication on critical accounts.',
                'Reconnect to the internet and run a second scan to confirm removal.',
            ],
            prevention:["Never open email attachments from unknown senders.",'Download software only from official sources.','Keep antivirus active and updated.'],
        },
        app_crashes: {
            title:'App Crashes & Freezes — Troubleshooting', category:'Software Optimisation', difficulty:'Easy',
            tools:['Device settings','App Store or Google Play'],
            steps:[
                'Force close the crashing app and relaunch it.',
                'Check for a pending app update in the App Store or Google Play.',
                'Clear the app cache: Settings › Apps › App › Clear Cache (Android).',
                'Uninstall and reinstall the application.',
                'Check available storage — apps frequently crash when storage is below 5%.',
                'Restart the device and relaunch the app.',
                'Check if the app is compatible with your current OS version.',
                'If crashes persist across multiple apps, run a full antivirus scan.',
            ],
            prevention:['Keep all apps updated.','Avoid sideloading apps from unverified sources.','Keep at least 15% of storage free.'],
        },
        connectivity: {
            title:'Connectivity Issues — Wi-Fi, Bluetooth & Network', category:'Software Optimisation', difficulty:'Easy to Moderate',
            tools:['Device network settings','Router access (optional)'],
            steps:[
                'Toggle Airplane mode on for 10 seconds, then off again.',
                'Forget the Wi-Fi network and reconnect: Settings › Wi-Fi › Network › Forget › Reconnect.',
                'Restart the router by unplugging for 30 seconds.',
                'Check if other devices can connect to confirm whether the issue is the device or the network.',
                'Update network adapter drivers via Device Manager (Windows).',
                'Reset network settings: run "netsh winsock reset" in Command Prompt as Admin (Windows).',
                'For Bluetooth: remove all paired devices and re-pair from scratch.',
                'Run the built-in Network Troubleshooter: Settings › System › Troubleshoot › Network.',
            ],
            prevention:['Keep network adapter drivers updated.','Restart your router at least once a week.','Avoid unsecured public Wi-Fi.'],
        },
    };

    /* ── REPAIR-OR-DIY LOGIC ── */
    function needsProfessional(damageType, severity, issueKey) {
        if (issueKey === 'water_liquid' && severity !== 'minor') return true;
        if (damageType === 'external' && severity === 'severe')  return true;
        if (damageType === 'software' && severity === 'severe' && (issueKey === 'os_boot' || issueKey === 'virus_malware')) return true;
        if (damageType === 'external' && severity === 'moderate' && (issueKey === 'screen' || issueKey === 'battery_charging')) return true;
        return false;
    }

    /* ════════════════════════════════
       STEP 2 — SEVERITY
    ════════════════════════════════ */
    function askSeverity() {
        tcState = TC.SEVERITY;
        setProgress(2, 4, 'Step 2 of 4 — Severity');

        const isExt     = tcCategory === 'external';
        const isUnknown = tcDamageType === 'unknown';

        const q = isUnknown
            ? 'How would you describe how the device is behaving overall?'
            : isExt
                ? 'How severe is the physical damage?'
                : 'How severe is the software issue?';

        addBotMessage(q);

        const choices = isExt && !isUnknown
            ? [
                { key:'minor',    label:'Minor',     desc:'Small scratches, loose keys, minor charging hiccup — device still fully works', icon:'🟢' },
                { key:'moderate', label:'Moderate',  desc:'Screen flickering, battery draining fast, some features non-functional',         icon:'🟡' },
                { key:'severe',   label:'Severe',    desc:'Cracked screen, water damage, won\'t charge or turn on',                         icon:'🔴' },
              ]
            : isUnknown
            ? [
                { key:'minor',    label:'Slightly Off',   desc:'Odd behaviour occasionally, but mostly works',             icon:'🟢' },
                { key:'moderate', label:'Noticeably Bad', desc:'Regular freezes, constant slowdown, some features broken', icon:'🟡' },
                { key:'severe',   label:'Barely Usable',  desc:'Crashes constantly, won\'t boot, or unresponsive',          icon:'🔴' },
              ]
            : [
                { key:'minor',    label:'Minor',     desc:'Slightly slow, occasional app glitch — still usable',          icon:'🟢' },
                { key:'moderate', label:'Moderate',  desc:'Frequent crashes, noticeable slowdown, connectivity problems',  icon:'🟡' },
                { key:'severe',   label:'Severe',    desc:'Cannot boot, OS failure, suspected virus, data loss risk',      icon:'🔴' },
              ];

        renderChoices(choices, onSeverity);
    }

    function onSeverity(key) {
        tcSeverity = key;
        const labels = { minor:'🟢 Minor', moderate:'🟡 Moderate', severe:'🔴 Severe' };
        addUserMessage(labels[key]);
        clearInputArea();
        setTimeout(() => askSpecificIssue(), 600);

        const label = found?.label || (tcIssue || '').replace(/_/g, ' ');

                        🔍 Search Tutorials &amp; Manuals
                    </button>

                        Skip this step
                    </button>
                </div>
            `);

            document.getElementById('searchTutBtn').addEventListener('click', doTutorialSearch);
            document.getElementById('skipTutBtn').addEventListener('click',   showRestartOptions);
        }, 400);
    }

    async function doTutorialSearch() {
        const brand = (document.getElementById('brandInput')?.value || '').trim();
        const model = (document.getElementById('modelInput')?.value || '').trim();

        if (!brand || !model) {
            ['brandInput','modelInput'].forEach(id => {
                const el = document.getElementById(id);
                if (el && !el.value.trim()) {
                    el.style.borderColor = '#e74c3c';
                    setTimeout(() => { if (el) el.style.borderColor = ''; }, 1500);
                }
            });
            return;
        }

        const all   = [...EXTERNAL_ISSUES, ...SOFTWARE_ISSUES];
        const found = all.find(i => i.key === tcIssue);
        const issueLabel = found?.label || (tcIssue || '').replace(/_/g,' ');

        addUserMessage(`${brand} ${model}`);
        clearInputArea();
        showTyping();

        try {
            const data = await apiFetch('POST', '/api/techcare/tutorial-search', {
                brand, model, issue: tcIssue, issueLabel,
            });
            hideTyping();

            if (data.tutorialLinks?.length) {
                addBotMessage(`Found <strong>${data.tutorialLinks.length} resources</strong> for <strong>${escHtml(brand)} ${escHtml(model)}</strong>:`);
                setTimeout(() => renderTutorialLinks(data.tutorialLinks, data.searchQuery), 400);
            } else {
                addBotMessage(`No specific results found. Try searching <em>"${escHtml(brand)} ${escHtml(model)} ${escHtml(issueLabel)} fix"</em> on YouTube or <a href="https://www.ifixit.com" target="_blank" class="text-[#00bcd4] underline">iFixit.com</a>.`);
            }
        } catch (err) {
            hideTyping();
            addBotMessage(`Search unavailable right now. Try: <em>"${escHtml(brand)} ${escHtml(model)} ${escHtml(issueLabel)} fix"</em> on YouTube or <a href="https://www.ifixit.com" target="_blank" class="text-[#00bcd4] underline">iFixit.com</a>.`);
        }

        setTimeout(() => showRestartOptions(), 700);
    }

    function renderTutorialLinks(links, searchQuery) {
        const html = links.map(link => {
            const isYT = link.type === 'youtube';
            return `
                <a href="${escHtml(link.url)}" target="_blank" rel="noopener noreferrer" class="tutorial-link-card block">
                    <span class="text-xl flex-shrink-0">${isYT ? '▶️' : '📄'}</span>
                    <div class="flex-1 min-w-0">
                        <div class="text-xs font-semibold text-white truncate">${escHtml(link.title)}</div>
                        <div class="text-[10px] text-gray-400 mt-0.5">${escHtml(link.platform || (isYT ? 'YouTube' : 'Manual'))}</div>
                    </div>
                    <span class="text-[#00bcd4] text-xs">→</span>
                </a>
            `;
        }).join('');

        const card = document.createElement('div');
        card.className = 'animate-fadeIn mb-3';
        card.innerHTML = `
            <div class="space-y-2">
                ${html}
                <div class="text-[10px] text-gray-500 text-center pt-1">Or search: <em>${escHtml(searchQuery || '')}</em></div>
            </div>
        `;
        document.getElementById('chatMessages').appendChild(card);
        scrollMessages();
    }

    /* ════════════════════════════════
       DIRECTORY
    ════════════════════════════════ */
    async function loadDirectoryView() {
        document.getElementById('directorySection').classList.remove('hidden');
        document.getElementById('directorySection').scrollIntoView({ behavior:'smooth', block:'start' });

        if (!allLocations) {
            try {
                const data = await apiFetch('GET', '/api/techcare/locations');
                allLocations = data.locations;
            } catch (e) {
                allLocations = buildFallbackLocations();
            }
        }
        loadLocationCards('all');
        showRestartOptions();
    }

    function buildFallbackLocations() {
        const repairShops = [], eWasteBins = [];
        if (typeof LOCATION_DATA !== 'undefined') {
            for (const [id, loc] of Object.entries(LOCATION_DATA)) {
                const obj = { id, name:loc.title, type:loc.type, image:loc.img, address:loc.address, direction:loc.direction };
                loc.type === 'repair' ? repairShops.push(obj) : eWasteBins.push(obj);
            }
        }
        return { repairShops, eWasteBins };
    }

    function filterLocations(type) {
        ['filterAll','filterRepair','filterWaste'].forEach(id => {
            document.getElementById(id)?.classList.remove('bg-white/20','text-white');
        });
        const map = { all:'filterAll', repair:'filterRepair', waste:'filterWaste' };
        document.getElementById(map[type])?.classList.add('bg-white/20','text-white');
        loadLocationCards(type);
    }

    function loadLocationCards(type) {
        if (!allLocations) return;
        const grid = document.getElementById('locationsGrid');
        grid.innerHTML = '';
        const items = [];
        if (type === 'all' || type === 'repair') items.push(...(allLocations.repairShops || []));
        if (type === 'all' || type === 'waste')  items.push(...(allLocations.eWasteBins  || []));

        items.forEach(loc => {
            const isRepair = loc.type === 'repair';
            const badge    = isRepair ? 'location-badge-repair' : 'location-badge-waste';
            const bLabel   = isRepair ? 'Repair Shop' : 'E-Waste Bin';
            const srvList  = (loc.services || loc.accepts || []).map(s =>
                `<span class="text-[10px] bg-white/5 border border-white/10 text-gray-300 px-2 py-0.5 rounded-full">${escHtml(s)}</span>`
            ).join('');

            const card = document.createElement('div');
            card.className = 'location-card animate-fadeIn';
            card.innerHTML = `
                <div class="aspect-video bg-[rgba(255,255,255,0.05)] overflow-hidden relative">
                    <img src="../TransferMedia/${escHtml(loc.image || '')}" alt="${escHtml(loc.name)}"
                         class="w-full h-full object-cover opacity-80"
                         onerror="this.style.display='none'">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
                    <div class="absolute bottom-2 left-3">
                        <span class="text-[10px] font-bold px-2 py-0.5 rounded-full ${badge}">${bLabel}</span>
                    </div>
                </div>
                <div class="p-4">
                    <h3 class="text-white font-bold text-sm mb-1">${escHtml(loc.name)}</h3>
                    <p class="text-[11px] text-gray-400 mb-2 flex items-start gap-1">
                        <span>📍</span><span>${escHtml(loc.address || '')}</span>
                    </p>
                    ${loc.hours ? `<p class="text-[10px] text-blue-300 mb-2">🕐 ${escHtml(loc.hours)}</p>` : ''}
                    <div class="flex flex-wrap gap-1 mb-3">${srvList}</div>
                    <div class="bg-[rgba(0,185,212,0.06)] border border-[rgba(0,185,212,0.15)] rounded-lg p-2.5">
                        <div class="text-[10px] text-[#00bcd4] font-bold uppercase tracking-wider mb-1">🗺 Directions</div>
                        <p class="text-[11px] text-gray-300">${escHtml(loc.direction || '')}</p>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });

        if (!items.length) {
            grid.innerHTML = '<div class="col-span-2 text-center text-gray-400 py-8">No locations found.</div>';
        }
    }

    /* ════════════════════════════════

    function showRestartOptions() {
        setInputArea(`
            <div class="flex gap-3 pt-2">
                <button onclick="resetChat()" class="flex-1 text-xs font-bold text-white border border-[rgba(255,255,255,0.2)] rounded-xl py-3 hover:bg-white/10 transition-colors">
                    ↺ Start Over
                </button>
                <button onclick="selectIntent('find_location')" class="flex-1 text-xs font-bold text-[#ffd400] border border-[rgba(255,212,0,0.3)] rounded-xl py-3 hover:bg-[rgba(255,212,0,0.08)] transition-colors">
                    📍 View Locations
                </button>
            </div>
        `);
    }

    function resetChat() {
        document.getElementById('directorySection').classList.add('hidden');
        startChat();
    }

    /* ════════════════════════════════
       UI HELPERS
    ════════════════════════════════ */
    function addBotMessage(html) {
        const row = document.createElement('div');
        row.className = 'chat-row';
        row.innerHTML = `<div class="bot-avatar">🤖</div><div class="chat-bubble-bot">${html}</div>`;
        document.getElementById('chatMessages').appendChild(row);
        scrollMessages();
    }

    function addUserMessage(text) {
        const row = document.createElement('div');
        row.className = 'chat-row user';
        row.innerHTML = `<div class="chat-bubble-user">${escHtml(text)}</div>`;
        document.getElementById('chatMessages').appendChild(row);
        scrollMessages();
    }

    function showTyping() {
        const row = document.createElement('div');
        row.id = 'typingRow'; row.className = 'chat-row';
        row.innerHTML = `
            <div class="bot-avatar">🤖</div>
            <div class="chat-bubble-bot py-3 px-4">
                <div class="typing-dots"><span></span><span></span><span></span></div>
            </div>`;
        document.getElementById('chatMessages').appendChild(row);
        scrollMessages();
    }
    function hideTyping() { document.getElementById('typingRow')?.remove(); }

    /* renderChoices: takes an array and a callback function, binds via addEventListener */
    function renderChoices(choices, callback) {
        const wrapId = 'cw_' + Date.now();
        const btns = choices.map((c, i) => `
            <button class="choice-btn" data-idx="${i}">
                ${c.icon ? `<span class="choice-icon">${c.icon}</span>` : ''}
                <div>
                    ${c.group ? `<div class="text-[9px] text-gray-500 uppercase tracking-wider font-bold mb-0.5">${c.group}</div>` : ''}
                    <div class="choice-label">${c.label}</div>
                    ${c.desc ? `<div class="choice-desc">${c.desc}</div>` : ''}
                </div>
            </button>
        `).join('');

        setInputArea(`<div id="${wrapId}" class="space-y-2 pt-2 max-h-64 overflow-y-auto pr-1">${btns}</div>`);

        document.querySelectorAll(`#${wrapId} .choice-btn`).forEach(btn => {
            btn.addEventListener('click', () => {
                const i = parseInt(btn.dataset.idx, 10);
                callback(choices[i].key);
            });
        });
    }

    function setInputArea(html)  { document.getElementById('chatInputArea').innerHTML = html; }
    function clearInputArea()    { document.getElementById('chatInputArea').innerHTML = ''; }
    function clearMessages()     { document.getElementById('chatMessages').innerHTML = ''; }
    function scrollMessages()    { const el = document.getElementById('chatMessages'); el.scrollTop = el.scrollHeight; }
    function showResetBtn(show)  { document.getElementById('resetBtn').classList.toggle('hidden', !show); }
    function showProgress(show)  { document.getElementById('progressSection').classList.toggle('hidden', !show); }

    function setProgress(step, total, label) {
        document.getElementById('progressLabel').innerText = label;
        document.getElementById('progressFill').style.width = total ? `${(step / total) * 100}%` : '0%';
    }

    function escHtml(str) {
        if (typeof str !== 'string') return '';
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
    }
    </script>
</body>
</html>
